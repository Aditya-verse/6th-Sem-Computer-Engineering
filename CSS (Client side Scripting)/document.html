<!DOCTYPE html>
<html>
<head>
    <title>HTML Formatting</title>
</head>
<body>

<script>
    document.write("<b>Bold Text</b><br>");
    document.write("<i>Italic Text</i><br>");
    document.write("<u>Underlined Text</u><br>");
    document.write("<h2>Heading Text</h2>");
    document.write("<p>This is a <mark>highlighted</mark> paragraph.</p>");
</script>

</body>
</html>
